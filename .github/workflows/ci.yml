name: tester-repo CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tester-repo
        uses: actions/checkout@v4
        with:
          path: tester-repo

      # In real usage this pins a ref/SHA supplied by the FE/BE repo's PR workflow
      # (see README "Cross-repo gating"). Defaulting to main here so this workflow
      # is runnable standalone.
      - name: Checkout app-under-test (cypress-realworld-app)
        uses: actions/checkout@v4
        with:
          repository: cypress-io/cypress-realworld-app
          ref: ${{ github.event.client_payload.app_ref || 'develop' }}
          path: app

      # cypress-realworld-app's package.json pins "engines.node": "^22.0.0 || ^24.0.0" --
      # a dependency's postinstall enforces this strictly and fails the whole
      # install under Node 20.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # The app pins its package manager via corepack ("packageManager" in its
      # package.json) and its own scripts shell out to `yarn` internally
      # (prestart, start:ci) -- corepack enable lets that resolve correctly.
      - name: Enable corepack (yarn)
        run: corepack enable

      # yarn install --frozen-lockfile fails in this environment (verified);
      # npm installs the same dependency tree reliably and the app's own
      # scripts only need a working `yarn` binary at runtime (see previous
      # step), not for the install itself.
      # We only need the app's runtime deps to boot it -- not its bundled
      # Cypress suite, whose postinstall downloads a large external binary
      # and is a common source of CI flakiness/failures.
      - name: Install app dependencies
        working-directory: app
        env:
          CYPRESS_INSTALL_BINARY: "0"
        run: npm install --legacy-peer-deps

      - name: Install tester-repo dependencies
        working-directory: tester-repo
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tester-repo
        run: npx playwright install --with-deps chromium

      # Deliberately NOT `yarn start:ci`: that script serves the frontend via
      # scripts/testServer.ts, which fails to compile under this dependency
      # tree (TS2769 in its express/history typings), and its prestart hook
      # skips seeding data/database.json entirely. Plain `start` runs the
      # frontend through vite directly (verified working) and seeds the
      # database via its own prestart hook.
      - name: Start app under test
        working-directory: app
        run: yarn start &

      - name: Wait for app to be ready
        run: npx --yes wait-on tcp:3001 tcp:3000 --timeout 120000

      - name: Run gating test suite
        working-directory: tester-repo
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tester-repo/playwright-report/
          retention-days: 14
